<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>顔認証管理コンソール</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #172033;
      --muted: #68758a;
      --blue: #2563eb;
      --green: #15803d;
      --red: #b42318;
      --amber: #a15c07;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .api-note {
      color: var(--muted);
      font-size: 13px;
      word-break: break-all;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    section.full {
      grid-column: 1 / -1;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 650;
      padding: 8px 12px;
    }

    button.secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
    }

    button.danger {
      background: #fff;
      border-color: #f0b8b2;
      color: var(--red);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.ok {
      color: var(--green);
    }

    .status.bad {
      color: var(--red);
    }

    .result {
      min-height: 160px;
      max-height: 420px;
      overflow: auto;
      margin: 12px 0 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f172a;
      color: #dbeafe;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      padding: 12px;
      white-space: pre-wrap;
    }

    .faces {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }

    .face {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .face img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: #eef2f7;
    }

    .face strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .face small {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: #e7f0ff;
      color: #174ea6;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
    }

    .badge.pass {
      background: #e9f8ef;
      color: var(--green);
    }

    .badge.fail {
      background: #fff1f0;
      color: var(--red);
    }

    @media (max-width: 780px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>顔認証管理コンソール</h1>
      <a class="secondary" href="/">受信画像モニター</a>
    </div>
  </header>

  <main class="grid">
    <section>
      <h2>顔を登録</h2>
      <form id="register-form">
        <label>
          氏名 / ID
          <input name="name" type="text" placeholder="阪大　太郎" required>
        </label>
        <label>
          1人だけ写っている写真
          <input name="file" type="file" accept="image/*" required>
        </label>
        <div class="row">
          <button type="submit">登録</button>
          <span id="register-status" class="status"></span>
        </div>
      </form>
      <pre id="register-result" class="result">{}</pre>
    </section>

    <section class="full">
      <div class="row" style="justify-content: space-between; margin-bottom: 14px;">
        <h2 style="margin: 0;">登録済みの顔</h2>
        <button id="refresh-faces" type="button" class="secondary">更新</button>
      </div>
      <div id="faces" class="faces"></div>
    </section>
  </main>

  <script>
    const registerForm = document.querySelector("#register-form");
    const registerStatus = document.querySelector("#register-status");
    const registerResult = document.querySelector("#register-result");
    const facesEl = document.querySelector("#faces");
    const refreshButton = document.querySelector("#refresh-faces");
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

    function pretty(data) {
      return JSON.stringify(data, null, 2);
    }

    function apiUrl(path) {
      return `${API_BASE}${path}`;
    }

    function assetUrl(path) {
      if (!path) return "";
      if (path.startsWith("http://") || path.startsWith("https://")) return path;
      return `${API_BASE}${path}`;
    }

    function setBusy(form, busy) {
      form.querySelectorAll("button").forEach((element) => {
        element.disabled = busy;
      });
    }

    async function postForm(url, form) {
      const response = await fetch(apiUrl(url), {
        method: "POST",
        body: new FormData(form),
      });
      const data = await response.json().catch(() => ({
        ok: false,
        error: "サーバーからJSON形式の応答が返りませんでした。",
      }));
      if (!response.ok || data.ok === false) {
        throw data;
      }
      return data;
    }

    async function loadFaces() {
      try {
        const response = await fetch(apiUrl("/api/faces"));
        const data = await response.json();
        if (!response.ok || data.ok === false) {
          throw data;
        }

        const faces = data.faces || [];
        facesEl.replaceChildren();

        if (!faces.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "登録済みの顔はまだありません。";
          facesEl.appendChild(empty);
          return;
        }

        faces.forEach((face) => {
          const item = document.createElement("article");
          item.className = "face";

          if (face.image_url) {
            const image = document.createElement("img");
            image.src = assetUrl(face.image_url);
            image.alt = face.name || face.person_id;
            item.appendChild(image);
          }

          const text = document.createElement("div");
          const name = document.createElement("strong");
          name.textContent = face.name || face.person_id;
          const personId = document.createElement("small");
          personId.textContent = face.person_id;
          text.append(name, personId);

          const deleteButton = document.createElement("button");
          deleteButton.className = "danger";
          deleteButton.type = "button";
          deleteButton.textContent = "削除";
          deleteButton.addEventListener("click", async () => {
            if (!confirm(`${face.name || face.person_id} を削除しますか？`)) return;
            await fetch(apiUrl(`/api/faces/${encodeURIComponent(face.person_id)}`), { method: "DELETE" });
            await loadFaces();
          });

          item.append(text, deleteButton);
          facesEl.appendChild(item);
        });
      } catch (error) {
        facesEl.replaceChildren();
        const message = document.createElement("div");
        message.className = "empty";
        message.textContent = `登録済みの顔を読み込めませんでした: ${error.error || error.message || error}`;
        facesEl.appendChild(message);
      }
    }

    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setBusy(registerForm, true);
      registerStatus.textContent = "登録中...";
      registerStatus.className = "status";
      try {
        const data = await postForm("/api/register", registerForm);
        registerStatus.textContent = "登録しました";
        registerStatus.className = "status ok";
        registerResult.textContent = pretty(data);
        registerForm.reset();
        await loadFaces();
      } catch (error) {
        registerStatus.textContent = "登録に失敗しました";
        registerStatus.className = "status bad";
        registerResult.textContent = pretty(error);
      } finally {
        setBusy(registerForm, false);
      }
    });

    refreshButton.addEventListener("click", loadFaces);
    loadFaces();
  </script>
</body>
</html>
